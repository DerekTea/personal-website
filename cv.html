<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Derek Tea</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }

        nav {
            background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .nav-title { color: #fff; font-size: 1.2rem; font-weight: bold; letter-spacing: 0.05em; white-space: nowrap; }
        .nav-links { display: flex; gap: 1rem; list-style: none; }
        .nav-links a {
            display: inline-block; color: #fff; text-decoration: none;
            padding: 0.4rem 1.2rem; border-radius: 50px; font-size: 0.95rem; font-weight: 500;
            background: linear-gradient(145deg, #4a4a4a, #333);
            box-shadow: 3px 3px 8px rgba(0,0,0,0.5), -1px -1px 4px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.12);
            transition: all 0.15s ease; white-space: nowrap;
        }
        .nav-links a:hover {
            background: linear-gradient(145deg, #5a5a5a, #444);
            box-shadow: 1px 1px 4px rgba(0,0,0,0.5), -1px -1px 4px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.15);
            transform: translateY(1px);
        }
        .nav-links a:active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -1px -1px 3px rgba(255,255,255,0.05);
            transform: translateY(2px);
        }

        .content { max-width: 700px; margin: 2rem auto; padding: 0 1.5rem; }
        .content h2 { margin-bottom: 0.5rem; }
        .content p { margin-bottom: 0.5rem; line-height: 1.8; }

        @media (max-width: 500px) {
            nav { padding: 0 1rem; gap: 0.5rem; }
            .nav-title { font-size: 1rem; }
            .nav-links { gap: 0.4rem; }
            .nav-links a { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
            .content { padding: 0 1rem; margin: 1.25rem auto; }
        }
    </style>
</head>
<body>

    <nav>
        <span class="nav-title">Derek Tea</span>
        <ul class="nav-links">
            <li><a href="index.html">About Me</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="cv.html">CV</a></li>
        </ul>
    </nav>

    <footer style="text-align: center; color: #999; font-size: 0.85rem; padding: 1.5rem;">Last updated: March 2026</footer>

</body>
</html>
